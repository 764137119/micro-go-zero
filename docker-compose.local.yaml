services:
  # 服务注册中心
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    environment:
      - ETCD_NAME=etcd
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_TOKEN=dtm-local
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_DATA_DIR=/etcd-data
    ports:
      - "127.0.0.1:2379:2379"
      - "127.0.0.1:2380:2380"
    restart: unless-stopped

  # 本地测试用 MySQL（生产环境请替换为独立实例）
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dtm
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - /Users/wangyingwen/work/golang/mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 10

  dtm:
    build:
      context: ./dtm
      dockerfile: Dockerfile.dtm
    ports:
      - "127.0.0.1:36789:36789"
      - "127.0.0.1:36790:36790"
    environment:
      STORE: MYSQL
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:36789"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  user-rpc:
    build:
      context: .
      dockerfile: rpc/user-rpc/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - etcd
      - mysql
    restart: unless-stopped

  order-rpc:
    build:
      context: .
      dockerfile: rpc/order-rpc/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      dtm:
        condition: service_healthy
      etcd:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped

  stock-rpc:
    build:
      context: .
      dockerfile: rpc/stock-rpc/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      - etcd
      - dtm
      - mysql
    restart: unless-stopped

  # ===== 分布式定时任务调度服务 =====
  cronjob-rpc:
    build:
      context: .
      dockerfile: rpc/cronjob-rpc/Dockerfile
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      - etcd
      - mysql
    restart: unless-stopped

  # ===== Gin API 网关（整合 user + order 接口）=====
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "127.0.0.1:8888:8888"
    # etcd 地址已在 config.yaml 中配置，不再通过环境变量传递
    depends_on:
      - etcd
      - mysql
      - user-rpc
      - order-rpc
      - stock-rpc
    restart: unless-stopped