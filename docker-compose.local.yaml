version: '3.8'

services:
  # 服务注册中心
  etcd:
    image: bitnami/etcd:3.5
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    restart: unless-stopped

  # 本地测试用 MySQL（生产环境请替换为独立实例）
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dtm
    ports:
      - "3306:3306"
    volumes:
      - /Users/wangyingwen/work/golang/mysql_data:/var/lib/mysql
      - ./deploy/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 10

  dtm:
    build:
      context: ./dtm
      dockerfile: Dockerfile.dtm
    ports:
      - "36789:36789"
      - "36790:36790"
    environment:
      STORE: MYSQL
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  user-rpc:
    build:
      context: ./rpc/user-rpc
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - etcd
    restart: unless-stopped

  order-rpc:
    build:
      context: ./rpc/order-rpc
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - etcd
      - dtm
    restart: unless-stopped

  stock-rpc:
    build:
      context: ./rpc/stock-rpc
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - etcd
    restart: unless-stopped

  # ===== Gin API 网关（整合 user + order 接口）=====
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
      ETCD_ENDPOINTS: http://etcd:2379
    depends_on:
      - etcd
      - user-rpc
      - order-rpc
      - stock-rpc
    restart: unless-stopped