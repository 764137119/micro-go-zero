syntax = "proto3";

package stock;

option go_package = "./stock";

import "google/protobuf/empty.proto";


// ==================== 库存查询接口（非 dtm 调用）====================

// 查询单个商品库存请求
message QueryStockReq {
  int64 skuId = 1;
}

// 单个商品库存信息
message StockInfo {
  int64 skuId = 1;            // SKU ID
  int64 totalStock = 2;       // 总库存
  int64 availableStock = 3;   // 可用库存（可下单量）
  int64 lockedStock = 4;      // 锁定库存（被订单占用但未支付）
}

// 查询单个商品库存响应
message QueryStockResp {
  StockInfo stockInfo = 1;
}

// 批量查询库存请求
message BatchQueryStockReq {
  repeated int64 skuIds = 1;  // SKU ID 列表
}

// 批量查询库存响应
message BatchQueryStockResp {
  repeated StockInfo list = 1; // 库存信息列表
}

// ==================== TCC 分布式事务（dtm）接口 ====================
// TCC 三阶段：
//   Try：   冻结库存（available_stock -= qty, locked_stock += qty）
//   Confirm：确认扣减（locked_stock -= qty）
//   Cancel： 释放库存（available_stock += qty, locked_stock -= qty）
// xid + transType 用于 dtm Barrier 机制，保证幂等和子事务屏障

// TCC Try：冻结库存请求（Phase 1 - 资源预留）
message TccTryDeductStockReq {
  string xid = 1;           // dtm 全局事务 ID（用于幂等去重 + 子事务屏障）
  string transType = 2;     // dtm 事务类型，固定为 "tcc"
  int64 skuId = 3;          // 商品 SKU ID
  int64 quantity = 4;       // 冻结数量
  string orderNo = 5;       // 订单号（业务幂等键）
}

// TCC Confirm：确认扣减库存请求（Phase 2 - 提交，由 DTM 回调）
message TccConfirmDeductStockReq {
  string xid = 1;           // dtm 全局事务 ID
  string transType = 2;     // dtm 事务类型，固定为 "tcc"
  int64 skuId = 3;          // 商品 SKU ID
  int64 quantity = 4;       // 扣减数量
  string orderNo = 5;       // 订单号
}

// TCC Cancel：释放库存请求（Phase 2 - 回滚，由 DTM 回调）
message TccCancelDeductStockReq {
  string xid = 1;           // dtm 全局事务 ID
  string transType = 2;     // dtm 事务类型，固定为 "tcc"
  int64 skuId = 3;          // 商品 SKU ID
  int64 quantity = 4;       // 释放数量
  string orderNo = 5;       // 订单号
}

// 库存服务
service Stock {
  // 批量查询商品库存
  rpc BatchQueryStock(BatchQueryStockReq) returns (BatchQueryStockResp);
  // TCC Try：冻结库存（dtm TCC 全局事务 Try 阶段调用，预留资源）
  rpc TccTryDeductStock(TccTryDeductStockReq) returns (google.protobuf.Empty);
  // TCC Confirm：确认扣减库存（dtm TCC 全局事务 Confirm 阶段回调）
  rpc TccConfirmDeductStock(TccConfirmDeductStockReq) returns (google.protobuf.Empty);
  // TCC Cancel：释放库存（dtm TCC 全局事务 Cancel 阶段回调）
  rpc TccCancelDeductStock(TccCancelDeductStockReq) returns (google.protobuf.Empty);
}
